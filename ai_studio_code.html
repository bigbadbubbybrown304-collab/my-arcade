<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Arcade<span>Hub</span></h1>
        <input type="text" id="searchBar" placeholder="Search games..." onkeyup="filterGames()">
    </header>

    <main id="gameGrid">
        <!-- Games will be injected here by JavaScript -->
    </main>

    <!-- Game Player Overlay -->
    <div id="gameOverlay" class="hidden">
        <div class="controls">
            <button onclick="closeGame()">Back to Menu</button>
            <button onclick="toggleFullscreen()">Fullscreen</button>
        </div>
        <iframe id="gameFrame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
